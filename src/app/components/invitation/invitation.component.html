<section id="invitation" class="invitation-section">
  <div class="invitation-card glass-panel">
    <div class="card-inner">
      <h2>{{ lang.t().inviteTitle }}</h2>
      <p class="subtitle">{{ lang.t().inviteSub }}</p>
      
      <h3 class="names-script">{{ lang.t().inviteNames }}</h3>
      
      <div class="details">
        <div class="detail-item">
          <span class="icon">📅</span>
          <p>{{ lang.t().date }}</p>
        </div>
        <div class="detail-item">
          <span class="icon">⏰</span>
          <p>{{ lang.t().time }}</p>
        </div>
        <div class="detail-item">
          <span class="icon">📍</span>
          <p>
            <strong>{{ lang.t().venue }}</strong><br>
            {{ lang.t().address }}
          </p>
        </div>
      </div>
      
      <div class="map-container" style="margin-top: 1.5rem; border-radius: 12px; overflow: hidden; border: 2px solid rgba(212, 175, 55, 0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <iframe 
          src="https://maps.google.com/maps?q=The+Golden+Manor,+Konnagar,+West+Bengal&t=&z=15&ie=UTF8&iwloc=&output=embed" 
          width="100%" 
          height="200" 
          style="border:0; display: block;" 
          allowfullscreen="" 
          loading="lazy" 
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
      
      <div class="map-link" style="text-align: center; margin-top: 1rem;">
        <a href="https://maps.app.goo.gl/PgajRweLFx5caHcB9" target="_blank" rel="noopener noreferrer" class="btn-gold" style="font-size: 0.85rem; padding: 0.4rem 1.2rem; text-decoration: none; display: inline-block;">
          📌 {{ lang.t().mapBtn }}
        </a>
      </div>
      
      <div class="hosts-bottom" style="margin-top: 2.5rem; border-top: 1px solid rgba(212, 175, 55, 0.3); padding-top: 1.5rem;">
      
        <p class="subtitle" style="font-size: 1rem; color: var(--gold); letter-spacing: 1px;">{{ lang.t().hostFamily }}</p>
      </div>
    </div>
  </div>
</section>
